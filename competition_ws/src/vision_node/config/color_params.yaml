# 颜色检测 HSV 阈值参数
# ⚠️ 实机部署前必须用 calibrate_hsv.py 重新标定！
# 仿真光照和实机环境差异很大，默认值仅供参考。

# 红色 (HSV 色环中红色在0和180两端)
red:
  lower_1: [0, 100, 80]
  upper_1: [10, 255, 255]
  lower_2: [160, 100, 80]
  upper_2: [180, 255, 255]

# 绿色
green:
  lower: [40, 80, 60]
  upper: [80, 255, 255]

# 蓝色
blue:
  lower: [95, 80, 60]
  upper: [135, 255, 255]

# 处理参数
min_contour_area: 300      # 实机建议降低阈值
max_contour_area: 200000

# 相机话题 (在 launch 中通过 <param> 覆盖更灵活)
camera_topic: "/camera/color/image_raw"
depth_topic: "/camera/depth/image_rect_raw"
camera_info_topic: "/camera/color/camera_info"
publish_rate: 10
